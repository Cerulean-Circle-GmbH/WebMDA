<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>WebMDA - UML Editor</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        touch-action: manipulation;
        overflow: hidden;
      }
      #root {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      .toolbar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: #ffffff;
        border-top: 1px solid #cccccc;
        display: flex;
        justify-content: space-around;
        padding: 8px;
        z-index: 100;
      }
      .toolbar button {
        padding: 8px 12px;
        border: none;
        border-radius: 4px;
        background: #007bff;
        color: white;
        font-size: 14px;
        touch-action: manipulation;
        cursor: pointer;
      }
      .toolbar button:hover {
        background: #0056b3;
      }
      svg {
        width: 100%;
        height: 100%;
        background-color: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
